server {
    listen 80;
    listen [::]:80;
    server_name oci.tianyue.ren;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name oci.tianyue.ren;

    ssl_certificate /home/openresty/.acme.sh/oci.tianyue.ren_ecc/fullchain.cer;
    ssl_certificate_key /home/openresty/.acme.sh/oci.tianyue.ren_ecc/oci.tianyue.ren.key;

    root /home/openresty/html;
    index README.html index.html;

    location ~ ^/pl/?$ {
        return 301 https://$server_name/Poisoning-Log/;
    }

    location ~ ^/vr/?$ {
        return 301 https://$server_name/Voluptus-Research/;
    }

    location ~ ^/pcl/?$ {
        return 301 https://$server_name/Pharmaceutical-Chemical-Library/;
    }
   
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /home/openresty/html;
        allow all;
    }

    location / {
        try_files $uri $uri/ /README.html /index.html;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "no-cache" always;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;
    gzip_comp_level 6;

    access_log /var/log/openresty/site.access.log combined;
    error_log /var/log/openresty/site.error.log warn;
}
